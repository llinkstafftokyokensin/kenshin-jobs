<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>健診医師求人一覧</title>

  <style>
    body {
      margin: 0;
      padding: 20px;
      background: #f5f7fa;
      color: #222;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI",
                   "Yu Gothic", "Meiryo", sans-serif;
    }

    .container {
      max-width: 1400px;
      margin: 0 auto;
    }

    h1 {
      margin-bottom: 8px;
    }

    .description {
      margin-top: 0;
      color: #555;
    }

    .search-area {
      margin: 20px 0;
      padding: 16px;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
    }

    #searchInput {
      box-sizing: border-box;
      width: 100%;
      padding: 12px;
      border: 1px solid #bbb;
      border-radius: 6px;
      font-size: 16px;
    }

    #resultCount {
      margin-top: 10px;
      font-weight: bold;
    }

    .table-wrap {
      overflow-x: auto;
      background: #fff;
      border-radius: 8px;
      box-shadow: 0 1px 4px rgba(0, 0, 0, 0.1);
    }

    table {
      width: 100%;
      min-width: 1200px;
      border-collapse: collapse;
    }

    th,
    td {
      padding: 10px;
      border: 1px solid #ddd;
      text-align: left;
      vertical-align: top;
      white-space: pre-wrap;
    }

    th {
      position: sticky;
      top: 0;
      background: #1769aa;
      color: #fff;
      white-space: nowrap;
    }

    tr:nth-child(even) {
      background: #f8f9fb;
    }

    tr:hover {
      background: #eef6ff;
    }

    .loading,
    .error {
      padding: 20px;
      background: #fff;
      border-radius: 8px;
    }

    .error {
      color: #b00020;
    }

    .csv-link {
      display: inline-block;
      margin-bottom: 15px;
    }

    @media (max-width: 700px) {
      body {
        padding: 10px;
      }

      h1 {
        font-size: 24px;
      }
    }
  </style>
</head>

<body>
  <div class="container">
    <h1>健診医師求人一覧</h1>

    <p class="description">
      現在公開中の健診医師求人を掲載しています。
    </p>

    <a class="csv-link" href="jobs.csv">
      CSVデータを直接開く
    </a>

    <div class="search-area">
      <input
        id="searchInput"
        type="search"
        placeholder="勤務日、住所、駅、求人番号などで検索"
      >

      <div id="resultCount">読み込み中です……</div>
    </div>

    <div id="status" class="loading">
      求人データを読み込んでいます……
    </div>

    <div id="tableArea" class="table-wrap" hidden>
      <table>
        <thead>
          <tr id="tableHeader"></tr>
        </thead>

        <tbody id="tableBody"></tbody>
      </table>
    </div>
  </div>

  <script>
    const csvFile = "jobs.csv";

    const columns = [
      { key: "category", label: "区分" },
      { key: "job_number", label: "求人番号" },
      { key: "work_date", label: "勤務日" },
      { key: "address", label: "勤務地" },
      { key: "station", label: "最寄駅" },
      { key: "work_time", label: "勤務時間" },
      { key: "payment", label: "給与" },
      { key: "transport_fee", label: "交通費" },
      { key: "task", label: "業務内容" },
      { key: "count", label: "受診者数" },
      { key: "special_note", label: "特記事項" },
      { key: "search_guide", label: "検索案内" }
    ];

    let allJobs = [];

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function parseCSV(text) {
      const rows = [];
      let row = [];
      let field = "";
      let insideQuotes = false;

      text = text.replace(/^\uFEFF/, "");

      for (let i = 0; i < text.length; i++) {
        const character = text[i];
        const nextCharacter = text[i + 1];

        if (character === '"') {
          if (insideQuotes && nextCharacter === '"') {
            field += '"';
            i++;
          } else {
            insideQuotes = !insideQuotes;
          }
        } else if (character === "," && !insideQuotes) {
          row.push(field);
          field = "";
        } else if (
          (character === "\n" || character === "\r") &&
          !insideQuotes
        ) {
          if (character === "\r" && nextCharacter === "\n") {
            i++;
          }

          row.push(field);
          field = "";

          if (row.some(value => value.trim() !== "")) {
            rows.push(row);
          }

          row = [];
        } else {
          field += character;
        }
      }

      row.push(field);

      if (row.some(value => value.trim() !== "")) {
        rows.push(row);
      }

      if (rows.length === 0) {
        return [];
      }

      const headers = rows[0].map(header => header.trim());

      return rows.slice(1).map(values => {
        const item = {};

        headers.forEach((header, index) => {
          item[header] = values[index] ?? "";
        });

        return item;
      });
    }

    function createHeader() {
      const header = document.getElementById("tableHeader");

      header.innerHTML = columns
        .map(column => `<th>${escapeHtml(column.label)}</th>`)
        .join("");
    }

    function renderJobs(jobs) {
      const body = document.getElementById("tableBody");
      const resultCount = document.getElementById("resultCount");

      body.innerHTML = jobs.map(job => {
        const cells = columns.map(column => {
          return `<td>${escapeHtml(job[column.key])}</td>`;
        }).join("");

        return `<tr>${cells}</tr>`;
      }).join("");

      resultCount.textContent = `${jobs.length}件の求人を表示しています`;
    }

    function filterJobs() {
      const keyword = document
        .getElementById("searchInput")
        .value
        .trim()
        .toLowerCase();

      if (!keyword) {
        renderJobs(allJobs);
        return;
      }

      const filteredJobs = allJobs.filter(job => {
        return Object.values(job).some(value =>
          String(value ?? "").toLowerCase().includes(keyword)
        );
      });

      renderJobs(filteredJobs);
    }

    async function loadJobs() {
      const status = document.getElementById("status");

      try {
        const response = await fetch(
          `${csvFile}?time=${Date.now()}`,
          { cache: "no-store" }
        );

        if (!response.ok) {
          throw new Error(`CSV取得失敗：${response.status}`);
        }

        const csvText = await response.text();
        allJobs = parseCSV(csvText);

        status.hidden = true;
        document.getElementById("tableArea").hidden = false;

        renderJobs(allJobs);
      } catch (error) {
        status.className = "error";
        status.textContent =
          "求人データを読み込めませんでした。ページを再読み込みしてください。";

        document.getElementById("resultCount").textContent =
          "読み込みに失敗しました";

        console.error(error);
      }
    }

    createHeader();

    document
      .getElementById("searchInput")
      .addEventListener("input", filterJobs);

    loadJobs();
  </script>
</body>
</html>
